# cava config for the media widget's spectrum analyser (quickshell/MediaPanel.qml):
# 16 mono bars, raw ascii "b1;b2;...;b16;\n" frames on stdout, each 0-100.
# Same output plumbing as cava-vu.conf (VuMeter.qml), just more buckets and
# folded to mono so it reads as a spectrum of whatever's on the output sink.
[general]
framerate = 60
bars = 16

# autosens OFF: cava normally auto-rescales so the bars always "just fit"
# regardless of loudness — which is exactly why the response felt out of our
# hands (any fixed gain got overridden). With it off, the two knobs below are
# the real controls:
#   sensitivity    — fixed gain in %. Bars too short? raise it. Clipping at the
#                    top constantly? lower it.
#   noise_reduction — responsiveness (in [smoothing]). LOWER = snappier/twitchier,
#                    HIGHER = smoother/laggier. 0-100.
autosens = 0
sensitivity = 100

[output]
method = raw
data_format = ascii
ascii_max_range = 100
channels = mono

[smoothing]
noise_reduction = 30
