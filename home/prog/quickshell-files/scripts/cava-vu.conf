# cava config for the panel's stereo VU bars (quickshell/VuMeter.qml):
# 2 bars in stereo = one bucket per channel; raw ascii "L;R;\n" frames on
# stdout, 0-100.
[general]
framerate = 30
bars = 2

[output]
method = raw
data_format = ascii
ascii_max_range = 100
channels = stereo

[smoothing]
noise_reduction = 45
