# hypridle — idle management for Hyprland.
#
# Locks the Quickshell session lock (see quickshell/Lock.qml) after 5 minutes
# idle and before the machine sleeps, then blanks the display shortly after.
#
# Video playback that grabs a Wayland idle-inhibitor (zwp_idle_inhibit_manager_v1
# — Firefox/Chromium do this while playing) pauses hypridle's idle timers via
# Hyprland's ext-idle-notify, so it won't lock/blank mid-video.

general {
    # Everything funnels through logind's Lock signal: `loginctl lock-session`
    # emits it, hypridle catches it and runs lock_cmd. That gives one lock path
    # for idle, before-sleep, and any external `loginctl lock-session`.
    # `activate` is idempotent (Lock.qml no-ops if already locked), so repeat
    # signals are harmless.
    lock_cmd         = qs ipc call lock activate

    # Lock before suspend, and make sure the panel comes back on after waking.
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 5 minutes idle -> lock.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 30s after locking (5m30s idle) -> turn the display off; any input wakes it.
listener {
    timeout    = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
