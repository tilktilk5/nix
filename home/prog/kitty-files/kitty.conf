font_family	MorePerfectDOSVGA	
bold_font	auto
italic_font	auto
bold_italic_font auto
font_size	11.0
cursor_shape    block
shell_integration no-cursor
cursor		red
cursor_blink_interval 0.5
cursor_trail 2
cursor_trail_decay 0.1 0.2

# Mouse pointer hiding: <hide-wait> <unhide-wait> <unhide-threshold> <scroll-unhide>
# Require sustained real motion before showing the pointer, so merely focusing
# the window (a single enter event) or clicking won't reveal the I-beam.
mouse_hide_wait 3.0 0.2 40 no

include theme.conf
confirm_os_window_close 0

# Remote control over a per-process socket, so kitty-focus-dim.py (started from
# Hyprland autostart) can grey the foreground when the window is unfocused —
# kitty can't self-detect OS focus under Hyprland. socket-only = control only
# via this socket, never via terminal escape codes from the running program.
allow_remote_control socket-only
listen_on unix:/run/user/1000/kitty-{kitty_pid}
